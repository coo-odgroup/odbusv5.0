<section class="section popular-sec-seven">

            <p class="sub-title">Explore our most traveled destinations around the Cities</p>

                                </a>
                                <a href="javascript:void(0);" class="location-view"><i
                                        class="isax isax-arrow-right-1"></i></a>
                            </div>

                                <div>
